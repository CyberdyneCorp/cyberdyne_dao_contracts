# Cyberdyne DAO subgraph schema. Mirrors the event surface mapped in
# docs/EVENTS.md. One subgraph per deployed DAO (template); operators
# fill placeholders in subgraph.yaml at deploy time.

type Dao @entity {
  id: ID!                                        # DAO address
  createdAt: BigInt!
  payrollPlugin: PayrollPlugin
  uniswapPlugin: UniswapV4Plugin
  uniswapV3Plugin: UniswapV3Plugin
  aavePlugin: AaveLendingPlugin
  costRegistryPlugin: CostRegistryPlugin
  swaps: [Swap!]! @derivedFrom(field: "dao")
  lendingActions: [LendingAction!]! @derivedFrom(field: "dao")
  payouts: [PayrollPayout!]! @derivedFrom(field: "dao")
  payrollRecipients: [PayrollRecipient!]! @derivedFrom(field: "dao")
  v3Positions: [V3Position!]! @derivedFrom(field: "dao")
  v4LpOps: [V4LpOp!]! @derivedFrom(field: "dao")
  costEntries: [CostEntry!]! @derivedFrom(field: "dao")
  costPayments: [CostPayment!]! @derivedFrom(field: "dao")
}

# ---- Plugin singletons ----

type PayrollPlugin @entity {
  id: ID!                                        # plugin address
  dao: Dao!
  payDayOfMonth: Int!
  lastPayoutPeriod: BigInt!
  # Recipient-slot cap (v1.1). Null until the first MaxRecipientsUpdated; the
  # plugin defaults to 300 on-chain.
  maxRecipients: BigInt
  # Keeper-bounty config (v1.1). All zero = disabled (default).
  bountyToken: Bytes
  bountyPerCrank: BigInt
  bountyMaxPerPeriod: BigInt
  recipients: [PayrollRecipient!]! @derivedFrom(field: "plugin")
  payouts: [PayrollPayout!]! @derivedFrom(field: "plugin")
  bountyPayments: [KeeperBountyPayment!]! @derivedFrom(field: "plugin")
}

type UniswapV4Plugin @entity {
  id: ID!                                        # plugin address
  dao: Dao!
  universalRouter: Bytes!
  permit2: Bytes!
  poolManager: Bytes!
  v4PositionManager: Bytes                       # null before setV4PositionManager
  allowlistEnforced: Boolean!
  swapNonce: BigInt!
  lpNonce: BigInt!
  swaps: [Swap!]! @derivedFrom(field: "plugin")
  lpOps: [V4LpOp!]! @derivedFrom(field: "plugin")
}

type UniswapV3Plugin @entity {
  id: ID!                                        # plugin address
  dao: Dao!
  positionManager: Bytes!                        # canonical V3 NPM
  allowlistEnforced: Boolean!
  opNonce: BigInt!
  positions: [V3Position!]! @derivedFrom(field: "plugin")
  collects: [V3Collect!]! @derivedFrom(field: "plugin")
  managerMigrations: [V3ManagerMigration!]! @derivedFrom(field: "plugin")
}

type CostRegistryPlugin @entity {
  id: ID!                                        # plugin address
  dao: Dao!
  paymentToken: Bytes!                           # current token (USDC by default)
  # Entry-slot cap (v1.1). Null until the first MaxEntriesUpdated; the plugin
  # defaults to 300 on-chain.
  maxEntries: BigInt
  entries: [CostEntry!]! @derivedFrom(field: "plugin")
  payments: [CostPayment!]! @derivedFrom(field: "plugin")
  crankRuns: [CostCrankRun!]! @derivedFrom(field: "plugin")
}

type AaveLendingPlugin @entity {
  id: ID!                                        # plugin address
  dao: Dao!
  adapter: Bytes!
  allowlistEnforced: Boolean!
  opNonce: BigInt!
  actions: [LendingAction!]! @derivedFrom(field: "plugin")
}

# ---- Payroll ----

type PayrollRecipient @entity {
  id: ID!                                        # dao-address . payee-address
  dao: Dao!
  plugin: PayrollPlugin!
  payee: Bytes!
  token: Bytes!                                  # 0x0 = native ETH
  amount: BigInt!
  active: Boolean!
  addedAt: BigInt!
  removedAt: BigInt
  amountHistory: [RecipientAmountChange!]! @derivedFrom(field: "recipient")
}

type RecipientAmountChange @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  recipient: PayrollRecipient!
  oldAmount: BigInt!
  newAmount: BigInt!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type PayrollPayout @entity {
  id: ID!                                        # dao-address . period
  dao: Dao!
  plugin: PayrollPlugin!
  period: BigInt!                                # packed year*12+month
  recipientCount: Int!
  failureMap: BigInt!                            # bitmap, bit i = action i failed
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
  items: [PayrollPayoutItem!]! @derivedFrom(field: "payout")
}

# Derived per-recipient breakdown of a PayrollExecuted. Created in the
# mapping handler by zipping the failureMap bits against the on-chain
# recipient ordering at the time of the run.
type PayrollPayoutItem @entity(immutable: true) {
  id: ID!                                        # dao-address . period . payee
  payout: PayrollPayout!
  recipient: PayrollRecipient!
  amount: BigInt!
  failed: Boolean!
}

# A keeper bounty paid out on a successful crank (v1.1). At most one per
# executePayroll(Page) call; only emitted when the period's accumulated
# bounty is below the per-period cap.
type KeeperBountyPayment @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  plugin: PayrollPlugin!
  keeper: Bytes!
  token: Bytes!                                  # 0x0 = native ETH
  amount: BigInt!
  period: BigInt!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

# ---- Uniswap ----

type Swap @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  dao: Dao!
  plugin: UniswapV4Plugin!
  tokenIn: Bytes!
  amountIn: BigInt!
  tokenOut: Bytes!
  amountOutActual: BigInt!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

# ---- AAVE ----

enum LendingActionKind {
  SUPPLY
  WITHDRAW
  BORROW
  REPAY
}

type LendingAction @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  dao: Dao!
  plugin: AaveLendingPlugin!
  kind: LendingActionKind!
  asset: Bytes!
  amount: BigInt!
  amountActual: BigInt                           # populated for WITHDRAW (received) + REPAY (paid)
  interestRateMode: BigInt                       # populated for BORROW + REPAY
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

# ---- Audit trail ----

type AdapterMigration @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  plugin: AaveLendingPlugin!
  previous: Bytes!
  current: Bytes!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type RouterMigration @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  plugin: UniswapV4Plugin!
  previous: Bytes!
  current: Bytes!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type TokenAllowlistEntry @entity {
  id: ID!                                        # plugin-address . token-address
  plugin: UniswapV4Plugin!
  token: Bytes!
  allowed: Boolean!
  updatedAt: BigInt!
}

type AssetAllowlistEntry @entity {
  id: ID!                                        # plugin-address . asset-address
  plugin: AaveLendingPlugin!
  asset: Bytes!
  allowed: Boolean!
  updatedAt: BigInt!
}

# ---- Uniswap V3 LP ----

# An NPM-backed position. The DAO owns the NFT (recipient is forced to the
# DAO on mint + collect). `liquidity` is event-derived (sum of mint /
# increase / decrease deltas) — for live state the UI reads NPM.positions().
type V3Position @entity {
  id: ID!                                        # tokenId (decimal string)
  dao: Dao!
  plugin: UniswapV3Plugin!
  tokenId: BigInt!
  token0: Bytes!
  token1: Bytes!
  fee: Int!
  liquidity: BigInt!
  totalAmount0In: BigInt!                        # sum of mint + increase amount0
  totalAmount1In: BigInt!                        # sum of mint + increase amount1
  burned: Boolean!
  mintedAt: BigInt!
  burnedAt: BigInt
  collects: [V3Collect!]! @derivedFrom(field: "position")
}

type V3Collect @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  position: V3Position!
  plugin: UniswapV3Plugin!
  amount0: BigInt!
  amount1: BigInt!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type V3TokenAllowlistEntry @entity {
  id: ID!                                        # plugin-address . token-address
  plugin: UniswapV3Plugin!
  token: Bytes!
  allowed: Boolean!
  updatedAt: BigInt!
}

type V3ManagerMigration @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  plugin: UniswapV3Plugin!
  previous: Bytes!
  current: Bytes!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

# ---- Uniswap V4 LP ----

# Plugin emits `LiquidityModified(opNonce)` only — the action stream
# (mint/inc/dec/burn) is opaque to it. UI/subgraph correlate
# LiquidityModified ↔ DAO.Executed via the call-id scheme
# keccak256("UNI_V4_LP:" || opNonce). For position-level state the UI reads
# IV4PositionManager directly (it's not enumerable; scan Transfer events).
type V4LpOp @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  dao: Dao!
  plugin: UniswapV4Plugin!
  opNonce: BigInt!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type V4PositionManagerMigration @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  plugin: UniswapV4Plugin!
  previous: Bytes!
  current: Bytes!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

# ---- Cost registry ----

type CostEntry @entity {
  id: ID!                                        # plugin-address . entry-id
  dao: Dao!
  plugin: CostRegistryPlugin!
  entryId: BigInt!
  payee: Bytes!
  costUsdc: BigInt!
  frequencyDays: Int!
  name: String!
  active: Boolean!
  registeredAt: BigInt!
  removedAt: BigInt
  payments: [CostPayment!]! @derivedFrom(field: "entry")
}

type CostPayment @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  dao: Dao!
  plugin: CostRegistryPlugin!
  entry: CostEntry!
  payee: Bytes!
  amount: BigInt!
  paidAt: BigInt!
  block: BigInt!
  txHash: Bytes!
}

# One CostsProcessed batch. `failureMap` is page-local — bit i = the i-th
# paid entry of THAT batch reverted (see docs/EVENTS.md).
type CostCrankRun @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  dao: Dao!
  plugin: CostRegistryPlugin!
  fromIndex: BigInt!
  count: BigInt!
  failureMap: BigInt!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}

type PaymentTokenMigration @entity(immutable: true) {
  id: ID!                                        # txHash-logIndex
  plugin: CostRegistryPlugin!
  previous: Bytes!
  current: Bytes!
  timestamp: BigInt!
  block: BigInt!
  txHash: Bytes!
}
