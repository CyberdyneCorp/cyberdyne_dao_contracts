# Cyberdyne DAO subgraph manifest — one subgraph per deployed DAO.
#
# Operators MUST replace the {{...}} placeholders below with values from the
# deployments/<chain>-<timestamp>.json manifest produced by
# `just deploy-cyberdyne-dao`. See subgraph/README.md for the exact recipe.
#
# `network` follows The Graph's naming (mainnet | base | sepolia | ...). The
# Graph CLI's mustache template substitution lets this file double as a
# template — operators run `graph build --network <name>` after dropping in
# a config JSON, or `sed` the placeholders directly.

specVersion: 1.0.0
description: Cyberdyne DAO — Payroll + Uniswap V4 (swaps + LP) + Uniswap V3 LP + AAVE lending + CostRegistry
repository: https://github.com/CyberdyneCorp/cyberdyne_dao_contracts
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: PayrollPlugin
    network: "{{NETWORK}}"
    source:
      address: "{{PAYROLL_ADDRESS}}"
      abi: PayrollPlugin
      startBlock: {{PAYROLL_START_BLOCK}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/payroll.ts
      entities:
        - PayrollPlugin
        - PayrollRecipient
        - PayrollPayout
        - PayrollPayoutItem
        - RecipientAmountChange
        - KeeperBountyPayment
        - Dao
      abis:
        - name: PayrollPlugin
          file: ./abis/PayrollPlugin.json
      eventHandlers:
        - event: RecipientAdded(indexed address,indexed address,uint256)
          handler: handleRecipientAdded
        - event: RecipientRemoved(indexed address)
          handler: handleRecipientRemoved
        - event: RecipientAmountUpdated(indexed address,uint256,uint256)
          handler: handleRecipientAmountUpdated
        - event: PayDayUpdated(uint8,uint8)
          handler: handlePayDayUpdated
        - event: PayrollExecuted(indexed uint256,uint256,uint256)
          handler: handlePayrollExecuted
        - event: KeeperBountyConfigured(indexed address,uint256,uint256)
          handler: handleKeeperBountyConfigured
        - event: KeeperBountyPaid(indexed address,indexed address,uint256,indexed uint256)
          handler: handleKeeperBountyPaid

  - kind: ethereum
    name: UniswapV4Plugin
    network: "{{NETWORK}}"
    source:
      address: "{{UNISWAP_ADDRESS}}"
      abi: UniswapV4Plugin
      startBlock: {{UNISWAP_START_BLOCK}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/uniswap.ts
      entities:
        - UniswapV4Plugin
        - Swap
        - RouterMigration
        - TokenAllowlistEntry
        - V4LpOp
        - V4PositionManagerMigration
        - Dao
      abis:
        - name: UniswapV4Plugin
          file: ./abis/UniswapV4Plugin.json
      eventHandlers:
        - event: SwapExecuted(indexed address,uint256,indexed address,uint256)
          handler: handleSwapExecuted
        - event: AllowedTokenSet(indexed address,bool)
          handler: handleAllowedTokenSet
        - event: UniversalRouterUpdated(indexed address,indexed address)
          handler: handleUniversalRouterUpdated
        - event: V4PositionManagerUpdated(indexed address,indexed address)
          handler: handleV4PositionManagerUpdated
        - event: LiquidityModified(indexed uint256)
          handler: handleLiquidityModified

  - kind: ethereum
    name: AaveLendingPlugin
    network: "{{NETWORK}}"
    source:
      address: "{{AAVE_ADDRESS}}"
      abi: AaveLendingPlugin
      startBlock: {{AAVE_START_BLOCK}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/aave.ts
      entities:
        - AaveLendingPlugin
        - LendingAction
        - AdapterMigration
        - AssetAllowlistEntry
        - Dao
      abis:
        - name: AaveLendingPlugin
          file: ./abis/AaveLendingPlugin.json
      eventHandlers:
        - event: Supplied(indexed address,uint256)
          handler: handleSupplied
        - event: Withdrawn(indexed address,uint256,uint256)
          handler: handleWithdrawn
        - event: Borrowed(indexed address,uint256,uint256)
          handler: handleBorrowed
        - event: Repaid(indexed address,uint256,uint256,uint256)
          handler: handleRepaid
        - event: AdapterUpdated(indexed address,indexed address)
          handler: handleAdapterUpdated
        - event: AllowedAssetSet(indexed address,bool)
          handler: handleAllowedAssetSet

  - kind: ethereum
    name: UniswapV3Plugin
    network: "{{NETWORK}}"
    source:
      address: "{{UNISWAP_V3_ADDRESS}}"
      abi: UniswapV3Plugin
      startBlock: {{UNISWAP_V3_START_BLOCK}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/uniswap-v3.ts
      entities:
        - UniswapV3Plugin
        - V3Position
        - V3Collect
        - V3TokenAllowlistEntry
        - V3ManagerMigration
        - Dao
      abis:
        - name: UniswapV3Plugin
          file: ./abis/UniswapV3Plugin.json
      eventHandlers:
        - event: PositionMinted(indexed uint256,indexed address,indexed address,uint24,uint128,uint256,uint256)
          handler: handlePositionMinted
        - event: LiquidityIncreased(indexed uint256,uint128,uint256,uint256)
          handler: handleLiquidityIncreased
        - event: LiquidityDecreased(indexed uint256,uint128)
          handler: handleLiquidityDecreased
        - event: FeesCollected(indexed uint256,uint256,uint256)
          handler: handleFeesCollected
        - event: PositionBurned(indexed uint256)
          handler: handlePositionBurned
        - event: PositionManagerUpdated(indexed address,indexed address)
          handler: handlePositionManagerUpdated
        - event: AllowedTokenSet(indexed address,bool)
          handler: handleAllowedTokenSet

  - kind: ethereum
    name: CostRegistryPlugin
    network: "{{NETWORK}}"
    source:
      address: "{{COST_REGISTRY_ADDRESS}}"
      abi: CostRegistryPlugin
      startBlock: {{COST_REGISTRY_START_BLOCK}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/cost-registry.ts
      entities:
        - CostRegistryPlugin
        - CostEntry
        - CostPayment
        - CostCrankRun
        - PaymentTokenMigration
        - Dao
      abis:
        - name: CostRegistryPlugin
          file: ./abis/CostRegistryPlugin.json
      eventHandlers:
        - event: EntryRegistered(indexed uint256,indexed address,uint256,uint32,string)
          handler: handleEntryRegistered
        - event: EntryUpdated(indexed uint256,indexed address,uint256,uint32)
          handler: handleEntryUpdated
        - event: EntryRemoved(indexed uint256)
          handler: handleEntryRemoved
        - event: CostPaid(indexed uint256,indexed address,uint256,uint64)
          handler: handleCostPaid
        - event: CostsProcessed(uint256,uint256,uint256)
          handler: handleCostsProcessed
        - event: PaymentTokenUpdated(indexed address,indexed address)
          handler: handlePaymentTokenUpdated
