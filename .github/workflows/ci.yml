name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci
  NODE_VERSION: "20"
  # Authenticate foundryup's GitHub API calls (release-tag lookup) so the
  # `foundry-toolchain` install doesn't hit the unauthenticated 60-req/hr rate
  # limit (curl 403) when several jobs install Foundry in parallel.
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  lint:
    name: Lint (solhint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint:sol
      - run: npm run format:check

  forge-build:
    name: forge build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: forge --version
      - run: forge build --sizes

  hardhat-build:
    name: hardhat compile + typechain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: npm ci --legacy-peer-deps
      - run: npx hardhat compile
      - name: Export ABIs (build:abi)
        run: npm run build:abi
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-abi
          path: frontend-abi/
          if-no-files-found: ignore

  unit:
    name: Unit tests (no fork)
    runs-on: ubuntu-latest
    needs: [hardhat-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: npm ci --legacy-peer-deps
      - run: npx hardhat test
      - name: forge test (unit + invariants, no fork)
        # Invariants live under test/invariants/; fork tests under test/**/*.fork.t.sol
        # are excluded here (run in the dedicated `fork` job below).
        # CI profile bumps invariant runs to 1000 x 50 = 50k sequences per
        # the ROADMAP P8 exit criterion.
        env:
          FOUNDRY_PROFILE: ci
        run: forge test --no-match-path 'test/**/*.fork.t.sol' -vv

  fork:
    name: Fork tests (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [hardhat-build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mainnetFork
            rpc_secret: RPC_MAINNET
            pin_secret: PIN_MAINNET
            chain_id: 1
            port: 8545
            # Verified mainnet TokenVoting PluginRepo (build 1 — PUSH0-using
            # impl, runs on the cancun fork started below). Enables the e2e
            # create→vote→execute governance round-trips.
            token_voting_repo: "0xb7401cD221ceAFC54093168B814Cc3d42579287f"
            token_voting_build: "1"
          - target: baseFork
            rpc_secret: RPC_BASE
            pin_secret: PIN_BASE
            chain_id: 8453
            port: 8546
            # No pinned Base TokenVoting repo → governance round-trips self-skip
            # on Base; the 5-plugin bootstrap + §9 matrix still run.
            token_voting_repo: ""
            token_voting_build: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: npm ci --legacy-peer-deps
      - name: Run fork tests
        env:
          RPC_MAINNET: ${{ secrets[matrix.rpc_secret] }}
          RPC_BASE: ${{ secrets[matrix.rpc_secret] }}
          PIN_MAINNET: ${{ vars[matrix.pin_secret] }}
          PIN_BASE: ${{ vars[matrix.pin_secret] }}
          TOKEN_VOTING_REPO: ${{ matrix.token_voting_repo }}
          TOKEN_VOTING_BUILD: ${{ matrix.token_voting_build }}
        run: |
          RPC="${RPC_MAINNET}${RPC_BASE}"
          if [ -z "$RPC" ]; then
            echo "::warning::No RPC secret configured for ${{ matrix.target }} — skipping"
            exit 0
          fi
          PIN="${PIN_MAINNET}${PIN_BASE}"

          # Launch the fork node the named `*Fork` hardhat network connects to.
          # --hardfork cancun is REQUIRED: the verified TokenVoting impl uses
          # PUSH0, which only activates from the shanghai/cancun upgrade.
          anvil --fork-url "$RPC" \
            --chain-id ${{ matrix.chain_id }} \
            --port ${{ matrix.port }} \
            --hardfork cancun \
            ${PIN:+--fork-block-number "$PIN"} &
          ANVIL_PID=$!
          trap 'kill $ANVIL_PID 2>/dev/null || true' EXIT

          # Wait for the node to accept RPC before running the suite.
          for i in $(seq 1 60); do
            if cast block-number --rpc-url "http://127.0.0.1:${{ matrix.port }}" >/dev/null 2>&1; then
              echo "anvil ready after ${i} attempt(s)"
              break
            fi
            sleep 2
          done

          npx hardhat test --network ${{ matrix.target }}

  coverage:
    name: Coverage (gate >=90% on src/plugins/**)
    runs-on: ubuntu-latest
    needs: [hardhat-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: npm ci --legacy-peer-deps
        # solidity-coverage instruments every contract and holds the full trace
        # set in memory; the grown test suite exceeds the runner's default ~4 GB
        # node heap, so raise it (the gate itself passes at >=90% — see
        # scripts/check-coverage.js).
      - run: npx hardhat coverage
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      - run: node scripts/check-coverage.js
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

  slither:
    name: Slither static analysis
    runs-on: ubuntu-latest
    needs: [forge-build]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install Slither
        run: pip install slither-analyzer
      - run: npm ci --legacy-peer-deps
      - name: Run Slither
        # Per-finding triage lives in docs/plugins/*.md (audit-notes section).
        # CI gate trips only on high-severity findings; info/low are reviewed in PRs.
        run: slither . --filter-paths "lib/|node_modules/|test/" --exclude-dependencies --fail-high
        continue-on-error: false
