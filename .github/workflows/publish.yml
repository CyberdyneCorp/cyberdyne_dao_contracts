name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm pack instead of publish"
        required: false
        default: "true"
        type: string

jobs:
  publish:
    name: "@cyberdyne/dao-contracts"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - run: npm ci --legacy-peer-deps

      - name: Build package artifacts
        run: npm run build:package

      - name: Verify artifact shape
        run: |
          test -f index.mjs
          test -f addresses.json
          test -d frontend-abi
          test "$(ls -1 frontend-abi/*.json | wc -l)" -ge 10
          echo "addresses.json chain count: $(jq 'length' addresses.json)"
          echo "frontend-abi file count: $(ls -1 frontend-abi/*.json | wc -l)"

      - name: Pack (dry-run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        run: |
          npm pack
          ls -la *.tgz
          tar -tzf *.tgz | head -30

      - name: Publish (release tag)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
